<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradie Admin | Edit Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/admin.css?v=2">
    <link rel="stylesheet" href="css/icons.css">
    <style>
        .variant-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: #f9f9f9; padding: 10px; border-radius: 4px; border: 1px solid #eee; }
        .variant-row input { margin-bottom: 0; padding: 8px; flex: 1 1 120px; }
        .variant-row .variant-sku { flex-basis: 100px; font-family: monospace; font-weight: 600; }
        .variant-row .variant-image { flex-basis: 240px; }
        .variant-row .btn-remove { background: #fee; color: red; border: 1px solid #fcc; padding: 8px; border-radius: 4px; cursor: pointer; }
    </style>
  <link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/toast.css?v=1780167435">
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <header class="topbar"><a href="admin-products.html">← Back to Products</a></header>
            <div class="content-wrapper">
                <div class="dashboard-header" style="margin-bottom: 30px;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h2 id="form-title" style="margin:0; font-size: 2rem;">Add / Edit Product</h2>
                            <p style="color: var(--admin-muted); margin-top: 5px;">Enter product details, pricing, and variants.</p>
                        </div>
                    </div>
                </div>
                <div class="form-card">
                    <form id="product-form">
                        <input type="hidden" id="product-id">
                        
                        <div class="form-row">
                            <div class="form-group"><label>Name *</label><input type="text" id="p-name" required></div>
                            <div class="form-group">
                                <label>Category *</label>
                                <input type="text" id="p-category" list="category-list" required autocomplete="off" placeholder="Select or type new category">
                                <datalist id="category-list"></datalist>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group"><label>Price *</label><input type="number" id="p-price" required></div>
                            <div class="form-group"><label>SKU (for API Sync)</label><input type="text" id="p-sku" placeholder="e.g. SP001"></div>
                            <div class="form-group"><label>Website Stock</label><input type="number" id="p-stock" value="20"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label style="display:flex; justify-content:space-between;">Tiki Stock <a href="#" id="btn-sync-tiki" style="color:var(--admin-primary); font-size:0.85em; text-decoration:none;">🔄 Sync Ảnh</a></label>
                                <input type="number" id="p-stock-tiki" value="20">
                            </div>
                            <div class="form-group">
                                <label style="display:flex; justify-content:space-between;">Lazada Stock <a href="#" id="btn-sync-lazada" style="color:var(--admin-primary); font-size:0.85em; text-decoration:none;">🔄 Sync Ảnh</a></label>
                                <input type="number" id="p-stock-lazada" value="20">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Gallery Images (Enter each URL on a new line or separated by comma) * Minimum 3</label>
                            <textarea id="p-gallery" rows="4" placeholder="https://img1.jpg&#10;https://img2.jpg&#10;https://img3.jpg" required></textarea>
                            <small style="color:var(--admin-muted)">The first image will be used as the main image. Cloudinary URLs are supported.</small>
                        </div>
                        
                        
                        <div class="form-group">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                                <label style="margin:0;">Product Variants</label>
                                <button type="button" class="outline-button" style="padding:5px 10px; font-size:0.8rem;" onclick="addVariantRow()">+ Add Variant</button>
                            </div>
                            <div id="variants-container" style="display:flex; flex-direction:column; gap:10px;">
                                <p style="color:var(--admin-muted); font-size:0.9rem;">No variants added. Product will be treated as a single item.</p>
                            </div>
                        </div>

                        
                        <div class="form-group"><label>Description</label><textarea id="p-desc" rows="4"></textarea></div>
                        
                        <button type="submit" class="btn-primary">Save Product</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
  <script src="js/icons.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/global-data.js?v=1780167290"></script>
    <script src="js/data-store.js?v=1782402300"></script>
    <script src="js/admin-auth.js?v=1780167290"></script>
    <script src="js/admin.js?v=2"></script>
    <script>

        let currentVariants = [];
        
        window.renderVariants = function() {
            const container = document.getElementById('variants-container');
            if (currentVariants.length === 0) {
                container.innerHTML = '<p style="color:var(--admin-muted); font-size:0.9rem; padding:10px; background:#f9f9f9; border-radius:4px; text-align:center;">No variants added.</p>';
                return;
            }
            container.innerHTML = currentVariants.map((v, i) => `
                <div class="variant-row">
                    <input class="variant-sku" type="text" placeholder="SKU" value="${v.sku || ''}" onchange="currentVariants[${i}].sku = this.value">
                    <input type="text" placeholder="Variant Name (e.g. Size M)" value="${v.name || (v.options ? v.options.join(' / ') : '')}" onchange="currentVariants[${i}].name = this.value">
                    <input type="number" placeholder="Price (VND)" value="${v.price || 0}" onchange="currentVariants[${i}].price = Number(this.value)">
                    <input type="number" placeholder="Web Stock" value="${v.stock || 0}" onchange="currentVariants[${i}].stock = Number(this.value); updateTotalStock();">
                    <input type="number" placeholder="Tiki" value="${v.tikiStock || 0}" onchange="currentVariants[${i}].tikiStock = Number(this.value)">
                    <input type="number" placeholder="Lazada" value="${v.lazadaStock || 0}" onchange="currentVariants[${i}].lazadaStock = Number(this.value)">
                    <input class="variant-image" type="text" placeholder="Variant image URL" value="${v.image || ''}" onchange="currentVariants[${i}].image = this.value">
                    <button type="button" class="btn-remove" onclick="removeVariantRow(${i})">X</button>
                </div>
            `).join('');
        };
        
        window.addVariantRow = function() {
            currentVariants.push({ sku: '', name: '', price: 0, stock: 10, tikiStock: 0, lazadaStock: 0, image: '' });
            renderVariants();
            updateTotalStock();
        };
        
        window.removeVariantRow = function(index) {
            currentVariants.splice(index, 1);
            renderVariants();
            updateTotalStock();
        };

        window.updateTotalStock = function() {
            // User requested to unlock Website Stock so they can edit it manually
            // We just leave it as is, no longer overriding it
        };

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const form = document.getElementById('product-form');
            
            const categories = window.GradieStore.getCategories() || [];
            const dataList = document.getElementById('category-list');
            if (dataList) {
                dataList.innerHTML = categories.map(c => `<option value="${c}">`).join('');
            }
            
            if (productId) {
                document.getElementById('form-title').innerText = "Edit Product";
                let product = window.GradieStore.getProductById(productId);
                
                // If product found but missing key fields, try to fill from GRADIE_DATA
                if (product && (!product.name || !product.category || !product.sku)) {
                    const origProducts = window.GRADIE_DATA?.products || [];
                    const normSku = s => String(s || '').replace(/[\s\-_]/g, '').toLowerCase();
                    const rootSku = s => normSku(String(s || '').trim().replace(/[-_]\d+$/i, ''));
                    const skuRelated = (a, b) => {
                        const aNorm = normSku(a);
                        const bNorm = normSku(b);
                        const aRoot = rootSku(a);
                        const bRoot = rootSku(b);
                        return Boolean(aNorm && bNorm && (
                            aNorm === bNorm ||
                            (aRoot && bRoot && aRoot === bRoot) ||
                            (aRoot && bNorm && aRoot === bNorm) ||
                            (bRoot && aNorm && bRoot === aNorm)
                        ));
                    };
                    const origMatch = origProducts.find(op => {
                        if (op.id === product.id) return true;
                        if (op.sku && product.sku && skuRelated(op.sku, product.sku)) return true;
                        if (Array.isArray(op.variants) && product.sku && op.variants.some(v => skuRelated(v.sku, product.sku))) return true;
                        // Match by image URL
                        if (op.image && product.image && op.image === product.image) return true;
                        if (op.gallery && product.gallery) {
                            const hasCommonImg = op.gallery.some(g => product.gallery.includes(g));
                            if (hasCommonImg) return true;
                        }
                        return false;
                    });
                    if (origMatch) {
                        if (!product.name && origMatch.name) product.name = origMatch.name;
                        if (!product.sku && origMatch.sku) product.sku = origMatch.sku;
                        if ((!product.category || product.category === 'Uncategorized') && origMatch.category) product.category = origMatch.category;
                        if ((!product.price || product.price === 0) && origMatch.price) product.price = origMatch.price;
                        if (!product.description && origMatch.description) product.description = origMatch.description;
                        if ((!product.variants || product.variants.length === 0) && origMatch.variants) product.variants = origMatch.variants;
                        if ((!product.gallery || product.gallery.length === 0) && origMatch.gallery) product.gallery = origMatch.gallery;
                        if ((!product.image || !String(product.image).startsWith('http')) && origMatch.image) product.image = origMatch.image;
                        // Save the enriched product back to store
                        window.GradieStore.updateProduct(product.id, product);
                    }
                }
                
                if (product) {
                    document.getElementById('product-id').value = product.id;
                    document.getElementById('p-name').value = product.name || '';
                    document.getElementById('p-sku').value = product.sku || '';
                    document.getElementById('p-category').value = product.category || '';
                    document.getElementById('p-price').value = product.price || 0;
                    
                    let v_sum = 0;
                    if (product.variants && product.variants.length > 0) {
                        v_sum = product.variants.reduce((sum, v) => sum + (Number(v.stock) || 0), 0);
                    }
                    const displayStock = v_sum > 0 ? v_sum : (product.stock || 0);
                    
                    document.getElementById('p-stock').value = displayStock;
                    document.getElementById('p-stock-tiki').value = product.tikiStock !== undefined ? product.tikiStock : displayStock;
                    document.getElementById('p-stock-lazada').value = product.lazadaStock !== undefined ? product.lazadaStock : displayStock;
                    
                    // Join with newline to avoid comma issues, though Cloudinary URLs support is added in split
                    const gallery = Array.isArray(product.gallery)
                        ? product.gallery.filter(img => window.GradieStore.isValidProductImageUrl(img))
                        : [];
                    (product.variants || []).forEach(v => {
                        if (v.image && window.GradieStore.isValidProductImageUrl(v.image) && !gallery.includes(v.image)) gallery.push(v.image);
                    });
                    document.getElementById('p-gallery').value = gallery.join('\n');
                    currentVariants = JSON.parse(JSON.stringify(product.variants || []));
                    document.getElementById('p-desc').value = product.description || '';
                }
            }
            renderVariants();
            updateTotalStock();
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const idInput = document.getElementById('product-id').value;
                const name = document.getElementById('p-name').value;
                const newId = idInput || name.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '-' + Date.now();
                
                // Split by newline OR comma followed by http (to preserve Cloudinary commas like f_auto,q_auto)
                let galleryArr = document.getElementById('p-gallery').value.split(/[\n]+|,(?=\s*http)/).map(s => s.trim()).filter(s => s);
                
                // Filter out variants without a name or options
                const cleanVariants = currentVariants.filter(v => (v.sku || v.name || (v.options ? v.options.join(' / ') : '') || v.image || '').trim() !== '');
                
                let finalStock = Number(document.getElementById('p-stock').value);

                const newPrice = Number(document.getElementById('p-price').value);
                const oldPriceEl = document.getElementById('p-old-price');
                const ratingEl = document.getElementById('p-rating');
                
                const productData = {
                    id: newId,
                    sku: document.getElementById('p-sku').value,
                    name: name,
                    category: document.getElementById('p-category').value,
                    price: newPrice,
                    compare_at_price: oldPriceEl ? Number(oldPriceEl.value) : null,
                    stock: finalStock,
                    rating: ratingEl ? Number(ratingEl.value) : 4.8,
                    image: galleryArr.length > 0 ? galleryArr[0] : '',
                    gallery: galleryArr,
                    tikiStock: Number(document.getElementById('p-stock-tiki').value),
                    lazadaStock: Number(document.getElementById('p-stock-lazada').value),
                    variants: cleanVariants,
                    description: document.getElementById('p-desc').value
                };
                
                const submitBtn = form.querySelector('button[type="submit"]');
                const origText = submitBtn.innerText;
                submitBtn.disabled = true;
                submitBtn.innerText = 'Saving...';

                try {
                    let priceChanged = false;
                    if (idInput) {
                        const oldProduct = window.GradieStore.getProductById(newId);
                        if (oldProduct && oldProduct.price !== newPrice) {
                            priceChanged = true;
                        }
                        await window.GradieStore.updateProduct(newId, productData);
                    } else {
                        await window.GradieStore.addProduct(productData);
                    }

                    if (priceChanged) {
                        showToast('Đang cập nhật giá lên Tiki...', 'info');
                        const tikiResult = await window.GradieStore.updateTikiProductPrice(newId, newPrice);
                        if (tikiResult.success) {
                            showToast('Đã cập nhật giá thành công trên Tiki!', 'success');
                        } else {
                            showToast(`Không thể cập nhật giá lên Tiki: ${tikiResult.message}`, 'warning');
                        }
                        // Allow toast to be read
                        await new Promise(r => setTimeout(r, 1500));
                    } else {
                        showToast('Đã lưu sản phẩm thành công!', 'success');
                        await new Promise(r => setTimeout(r, 1000));
                    }
                    window.location.href = 'admin-products.html';
                } catch (err) {
                    console.error(err);
                    showToast('Lỗi khi lưu sản phẩm.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerText = origText;
                }
            });
        });
        // --- SYNC API LOGIC ---
        document.getElementById('btn-sync-tiki').addEventListener('click', async (e) => {
            e.preventDefault();
            const sku = document.getElementById('p-sku').value;
            if (!sku) return showToast('Vui lòng nhập SKU trước khi đồng bộ', 'error');
            const settings = window.GradieStore ? (window.GradieStore.getSettings() || {}) : {};
            if ((!settings.tikiAppId && !settings.tikiAppKey) || !settings.tikiAppSecret) return showToast('Vui lòng cấu hình API Tiki trong Settings trước', 'error');
            
            showToast('Đang lấy dữ liệu từ Tiki...', 'info');
            try {
                const res = await fetch('/api/tiki', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'sync_products', appId: settings.tikiAppId, appKey: settings.tikiAppKey, appSecret: settings.tikiAppSecret })
                });
                const data = await res.json();
                if (data.success && data.products) {
                    const normSku = s => String(s || '').replace(/[\s\-_]/g, '').toLowerCase();
                    const rootSku = s => normSku(String(s || '').trim().replace(/[-_]\d+$/i, ''));
                    const skuRelated = (a, b) => {
                        const aNorm = normSku(a);
                        const bNorm = normSku(b);
                        const aRoot = rootSku(a);
                        const bRoot = rootSku(b);
                        return Boolean(aNorm && bNorm && (
                            aNorm === bNorm ||
                            (aRoot && bRoot && aRoot === bRoot) ||
                            (aRoot && bNorm && aRoot === bNorm) ||
                            (bRoot && aNorm && bRoot === aNorm)
                        ));
                    };
                    const match = data.products.find(p => skuRelated(p.sku, sku) || skuRelated(p.original_sku, sku) || String(p.id) === String(sku));
                    if (match) {
                        // Fill all available fields
                        if (match.name && !document.getElementById('p-name').value) {
                            document.getElementById('p-name').value = match.name;
                        }
                        if (match.sku && !document.getElementById('p-sku').value) {
                            document.getElementById('p-sku').value = match.sku;
                        }
                        const catEl = document.getElementById('p-category');
                        if (match.category && (!catEl.value || catEl.value === 'Uncategorized')) {
                            catEl.value = match.category;
                        }
                        if (match.price && (!document.getElementById('p-price').value || Number(document.getElementById('p-price').value) === 0)) {
                            document.getElementById('p-price').value = match.price;
                        }
                        if (match.description && !document.getElementById('p-desc').value) {
                            document.getElementById('p-desc').value = match.description;
                        }
                        if (match.stock !== undefined) {
                            document.getElementById('p-stock-tiki').value = match.stock;
                        }
                        if (match.variants && match.variants.length > 0 && currentVariants.length === 0) {
                            currentVariants = JSON.parse(JSON.stringify(match.variants));
                            renderVariants();
                        }
                        // Sync images
                        const galleryEl = document.getElementById('p-gallery');
                        let images = galleryEl.value.split(/[\n]+|,(?=\s*http)/).map(s => s.trim()).filter(s => s);
                        if (match.gallery && match.gallery.length > 0) {
                            const newImages = match.gallery.filter(img => !images.includes(img));
                            images = [...newImages, ...images];
                        } else if (match.image) {
                            images = [match.image, ...images.filter(img => img !== match.image)];
                        }
                        galleryEl.value = images.join('\n');
                        showToast('Đã đồng bộ dữ liệu từ Tiki!', 'success');
                    } else {
                        showToast('Không tìm thấy SKU này trên Tiki', 'error');
                    }
                } else {
                    showToast('Lỗi khi lấy dữ liệu Tiki', 'error');
                }
            } catch (err) { showToast('Lỗi kết nối Tiki', 'error'); }
        });

        document.getElementById('btn-sync-lazada').addEventListener('click', async (e) => {
            e.preventDefault();
            const sku = document.getElementById('p-sku').value;
            if (!sku) return showToast('Vui lòng nhập SKU trước khi đồng bộ', 'error');
            const settings = window.GradieStore ? (window.GradieStore.getSettings() || {}) : {};
            if (!settings.lazadaAppKey || !settings.lazadaAppSecret || !settings.lazadaAccessToken) return showToast('Vui lòng cấu hình API Lazada trong Settings trước', 'error');
            
            showToast('Đang lấy dữ liệu từ Lazada...', 'info');
            try {
                const res = await fetch('/api/lazada', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        action: 'sync_products', 
                        appKey: settings.lazadaAppKey, 
                        appSecret: settings.lazadaAppSecret,
                        accessToken: settings.lazadaAccessToken,
                        baseUrl: settings.lazadaApiBaseUrl
                    })
                });
                const data = await res.json();
                if (data.success && data.products) {
                    const normSku = s => String(s || '').replace(/[\s\-_]/g, '').toLowerCase();
                    const rootSku = s => normSku(String(s || '').trim().replace(/[-_]\d+$/i, ''));
                    const skuRelated = (a, b) => {
                        const aNorm = normSku(a);
                        const bNorm = normSku(b);
                        const aRoot = rootSku(a);
                        const bRoot = rootSku(b);
                        return Boolean(aNorm && bNorm && (
                            aNorm === bNorm ||
                            (aRoot && bRoot && aRoot === bRoot) ||
                            (aRoot && bNorm && aRoot === bNorm) ||
                            (bRoot && aNorm && bRoot === aNorm)
                        ));
                    };
                    const match = data.products.find(p => {
                        const targetSkuNorm = normSku(sku);
                        const pSkuNorm = normSku(p.sku);
                        if (pSkuNorm && (pSkuNorm === targetSkuNorm || skuRelated(p.sku, sku) || skuRelated(p.baseSku, sku))) return true;
                        if (p.variants && p.variants.length > 0) {
                            return p.variants.some(v => normSku(v.sku) === targetSkuNorm || skuRelated(v.sku, sku));
                        }
                        return String(p.id) === String(sku);
                    });
                    
                    if (match) {
                        // Fill all available fields
                        if (match.name && !document.getElementById('p-name').value) {
                            document.getElementById('p-name').value = match.name;
                        }
                        if (match.sku && !document.getElementById('p-sku').value) {
                            document.getElementById('p-sku').value = match.sku;
                        }
                        const catEl = document.getElementById('p-category');
                        if (match.category && (!catEl.value || catEl.value === 'Uncategorized')) {
                            catEl.value = match.category;
                        }
                        if (match.price && (!document.getElementById('p-price').value || Number(document.getElementById('p-price').value) === 0)) {
                            document.getElementById('p-price').value = match.price;
                        }
                        if (match.description && !document.getElementById('p-desc').value) {
                            document.getElementById('p-desc').value = match.description;
                        }
                        if (match.stock !== undefined) {
                            document.getElementById('p-stock-lazada').value = match.stock;
                        }
                        if (match.variants && match.variants.length > 0 && currentVariants.length === 0) {
                            currentVariants = JSON.parse(JSON.stringify(match.variants));
                            renderVariants();
                        }
                        // Sync images
                        const galleryEl = document.getElementById('p-gallery');
                        let images = galleryEl.value.split(/[\n]+|,(?=\s*http)/).map(s => s.trim()).filter(s => s);
                        if (match.gallery && match.gallery.length > 0) {
                            const newImages = match.gallery.filter(img => !images.includes(img));
                            images = [...newImages, ...images];
                        } else if (match.image) {
                            images = [match.image, ...images.filter(img => img !== match.image)];
                        }
                        galleryEl.value = images.join('\n');
                        showToast('Đã đồng bộ dữ liệu từ Lazada!', 'success');
                    } else {
                        showToast('Không tìm thấy SKU này trên Lazada', 'error');
                    }
                } else {
                    showToast('Lỗi khi lấy dữ liệu Lazada', 'error');
                }
            } catch (err) { showToast('Lỗi kết nối Lazada', 'error'); }
        });
    </script>
</body>
</html>
