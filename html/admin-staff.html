<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Staff & Roles - Gradie Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar will be injected by JS -->
        <aside class="sidebar" id="admin-sidebar"></aside>

        <main class="main-content">
            <header class="topbar"></header>

            <div class="content-wrapper">
                <div class="dashboard-header" style="margin-bottom: 30px;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h2 style="margin:0; font-size: 2rem;">Đội Ngũ Nhân Viên</h2>
                            <p style="color: var(--admin-muted); margin-top: 5px;">Quản lý vai trò, quyền hạn và xem báo cáo KPIs / hoa hồng của từng nhân sự.</p>
                        </div>
                        <button class="btn btn-primary" onclick="openAddStaffModal()">+ Thêm Nhân Viên</button>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Nhân Viên</th>
                                <th>Email / Liên Hệ</th>
                                <th>Vai Trò (Role)</th>
                                <th>Hoa Hồng / KPIs</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-staff-list">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
                
                <div style="margin-top: 40px;">
                    <style>
                        .btn-premium-reload {
                            display: inline-flex;
                            align-items: center;
                            justify-content: center;
                            gap: 6px;
                            padding: 0 16px;
                            height: 35px;
                            box-sizing: border-box;
                            border-radius: 6px;
                            border: 1px solid var(--adm-gold, #d8a94f);
                            background: transparent;
                            color: var(--adm-gold, #d8a94f);
                            font-size: 0.9rem;
                            font-weight: 600;
                            cursor: pointer;
                            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
                            font-family: inherit;
                            outline: none;
                            white-space: nowrap;
                        }
                        .btn-premium-reload:hover {
                            background: var(--adm-gold-light, #f4e8d1);
                            color: var(--adm-gold-hover, #c5963e);
                            border-color: var(--adm-gold-hover, #c5963e);
                            transform: translateY(-1px);
                            box-shadow: 0 4px 12px rgba(216, 169, 79, 0.12);
                        }
                        .btn-premium-reload:active {
                            transform: translateY(0);
                        }
                        .btn-premium-reload:disabled {
                            opacity: 0.6;
                            cursor: not-allowed;
                            transform: none;
                            box-shadow: none;
                        }
                        @keyframes spin {
                            from { transform: rotate(0deg); }
                            to { transform: rotate(360deg); }
                        }
                        .btn-premium-reload.loading svg {
                            animation: spin 1s linear infinite;
                        }
                    </style>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                        <h3 style="margin:0; font-family:'Playfair Display', serif; color:#1e293b; font-size:1.4rem;">Ghi Vết Thao Tác (Activity Logs)</h3>
                        <div style="display:flex; gap: 10px; align-items: center;">
                            <button id="btn-reload-logs" class="btn-premium-reload" onclick="window.reloadActivityLogs()">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="23 4 23 10 17 10"></polyline>
                                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                                </svg>
                                <span id="btn-reload-text">Làm mới</span>
                            </button>
                            <select id="log-filter-staff" onchange="if(window.renderActivityLogs) renderActivityLogs()" style="padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 0.9rem; outline: none; cursor: pointer; font-family: inherit;">
                                <option value="all">Tất cả nhân viên</option>
                                <!-- Populated dynamically -->
                            </select>
                            <select id="log-sort-order" onchange="if(window.renderActivityLogs) renderActivityLogs()" style="padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 0.9rem; outline: none; cursor: pointer; font-family: inherit;">
                                <option value="newest">Mới nhất trước</option>
                                <option value="oldest">Cũ nhất trước</option>
                            </select>
                        </div>
                    </div>
                    <div style="background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; max-height: 400px; overflow-y: auto;">
                        <table style="margin: 0; box-shadow: none; border-radius: 0;">
                            <thead style="position: sticky; top: 0; z-index: 10;">
                                <tr>
                                    <th>Thời gian</th>
                                    <th>Nhân viên</th>
                                    <th>Hành động</th>
                                    <th>Chi tiết</th>
                                </tr>
                            </thead>
                            <tbody id="admin-activity-logs">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Premium Modal Styles -->
    <style>
        #staff-modal .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
            display: block;
        }
        #staff-modal .form-group input, #staff-modal .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #0f172a;
            transition: all 0.2s;
            background: #f8fafc;
        }
        #staff-modal .form-group input:focus, #staff-modal .form-group select:focus {
            outline: none;
            border-color: #d8a94f;
            background: white;
            box-shadow: 0 0 0 3px rgba(216, 169, 79, 0.15);
        }
        #staff-modal .modal-content {
            border-radius: 16px;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 30px;
        }
        #staff-modal .modal-header {
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #staff-modal .modal-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #0f172a;
            margin: 0;
        }
    </style>

    <!-- Edit Staff Modal -->
    <div id="staff-modal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Cập Nhật Vai Trò & Hoa Hồng</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="staff-form">
                    <input type="hidden" id="staff-id">
                    <div class="form-group">
                        <label>Tên nhân viên</label>
                        <input type="text" id="staff-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="staff-email" required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu đăng nhập</label>
                        <input type="password" id="staff-password" placeholder="Nhập để đặt mật khẩu (Để trống nếu giữ nguyên cũ)">
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" id="staff-phone" required>
                    </div>
                    <div class="form-group">
                        <label>Vai trò (Role)</label>
                        <select id="staff-role" required>
                            <option value="Admin">Admin (Toàn quyền)</option>
                            <option value="Manager">Quản lý cửa hàng</option>
                            <option value="Sales">Sales (Bán hàng)</option>
                            <option value="Warehouse">Kho vận</option>
                            <option value="Accountant">Kế toán</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tỷ lệ hoa hồng (%) - Dành cho Sales</label>
                        <input type="number" id="staff-commission" min="0" max="100" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Mục tiêu KPIs (VNĐ)</label>
                        <input type="number" id="staff-kpi" min="0" step="1000000">
                    </div>
                    <div class="form-actions" style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 15px;">
                        <button type="button" class="close-modal" style="padding: 10px 24px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; color: #475569; font-weight: 600; cursor: pointer; transition: all 0.2s;">Hủy</button>
                        <button type="submit" style="padding: 10px 24px; border-radius: 8px; border: none; background: linear-gradient(135deg, #d8a94f 0%, #b8862d 100%); color: white; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(216, 169, 79, 0.3); transition: all 0.2s;">Lưu Thay Đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/data-store.js?v=4"></script>
    <script src="../js/admin-auth.js?v=4"></script>
    <script src="../js/admin.js?v=4"></script>
    <script src="../js/admin-staff.js?v=4"></script>
</body>
</html>
