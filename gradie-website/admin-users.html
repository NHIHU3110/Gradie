<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradie Admin | Users</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css?v=2">
    <link rel="stylesheet" href="css/icons.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #ffffff;
            margin: 5% auto;
            padding: 35px;
            width: 100%;
            max-width: 700px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid #d8a94f;
        }
        .detail-row {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .detail-row label {
            font-weight: 600;
            color: #475569;
        }
        .clickable-user {
            color: var(--admin-primary, #d8a94f);
            cursor: pointer;
            text-decoration: underline;
        }
        .clickable-user:hover {
            color: var(--admin-primary-hover, #c5963e);
        }
    </style>
  <link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/toast.css?v=1780167435">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <header class="topbar"></header>
            <div class="content-wrapper">
                
                <div class="dashboard-header" style="margin-bottom: 30px;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h2 style="margin:0; font-size: 2rem;">Users Manager</h2>
                            <p style="color: var(--admin-muted); margin-top: 5px;">View and manage registered user accounts and their transaction histories.</p>
                        </div>
                    </div>
                </div>

                <!-- Top 3 Customers Widget -->
                <div style="margin-bottom: 30px;">
                    <h3 style="margin-top:0; margin-bottom:15px; font-family:'Playfair Display', serif; color:#1e293b; font-size:1.4rem;">🏆 Top 3 Khách Hàng Tuần Này</h3>
                    <div id="top-customers-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                        <!-- Generated dynamically -->
                    </div>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Address</th>
                                <th>Orders</th>
                                <th>Total Spent</th>
                                <th>Tier</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-users-list">
                            <!-- Generated dynamically -->
                        </tbody>
                    </table>
                </div>
        
            </div>
        </main>
    </div>

    <!-- User Detail Modal -->
    <div id="userDetailModal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #eaeaea; padding-bottom:15px; margin-bottom:20px;">
                <h3 style="margin:0; font-family:'Playfair Display', serif; font-size:1.6rem; color:#1e293b;">User & Order History</h3>
                <button onclick="closeUserDetailModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:#94a3b8;">&times;</button>
            </div>
            
            <div style="display:flex; flex-direction:column; gap:8px;">
                <div class="detail-row"><label>User ID:</label><span id="detail-user-id" style="font-weight:600;"></span></div>
                <div class="detail-row"><label>Full Name:</label><span id="detail-user-name"></span></div>
                <div class="detail-row"><label>Email:</label><span id="detail-user-email"></span></div>
                <div class="detail-row"><label>Phone:</label><span id="detail-user-phone"></span></div>
                <div class="detail-row"><label>Address:</label><span id="detail-user-address"></span></div>

                <h4 style="font-family:'Playfair Display', serif; font-size:1.2rem; margin:25px 0 10px; color:#1e293b; border-bottom:1px solid #f1f5f9; padding-bottom:8px;">Orders Breakdown</h4>
                <div id="user-orders-list" style="margin-bottom:20px;">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <div style="margin-top:30px; text-align:right; border-top:1px solid #f1f5f9; padding-top:15px;">
                <button class="btn-primary" onclick="closeUserDetailModal()">Close</button>
            </div>
        </div>
    </div>
  <script src="js/icons.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/global-data.js?v=1780167290"></script>
    <script src="js/data-store.js?v=1780167290"></script>
    <script src="js/admin-auth.js?v=1780167290"></script>
    <script src="js/admin.js?v=2"></script>
    <script src="js/admin-users.js?v=1780167290"></script>
</body>
</html>
