<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradie Admin | Policies</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css?v=1780166734">

    <style>
        .modal { display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); }
        .modal-content { background:#fff; margin:50px auto; padding:20px; width:600px; border-radius:8px; max-height:80vh; overflow-y:auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
  <link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/toast.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <header class="topbar"></header>
            <div class="content-wrapper">
                
            
            <div class="dashboard-header" style="margin-bottom: 30px;">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2 style="margin:0; font-size: 2rem;">Policy Manager</h2>
                        <p style="color: var(--admin-muted); margin-top: 5px;">Update terms, privacy policies, and FAQs.</p>
                    </div>
                    <button class="btn-primary" onclick="openPolicyModal()">Add New Policy</button>
                </div>
            </div>
            <div class="table-wrapper">

                <table>
                    <thead>
                        <tr><th>Title</th><th>Content Snapshot</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="admin-policies-list">
                        <!-- Auto generated -->
                    </tbody>
                </table>
            </div>
        
            </div>
        </main>
    </div>
    
    <!-- Policy Modal -->
    <div id="policyModal" class="modal">
        <div class="modal-content">
            <h3 id="policyModalTitle" style="margin-top:0;">Add / Edit Policy</h3>
            <input type="hidden" id="policy-id">
            <div class="form-group"><label>Policy Title</label><input type="text" id="policy-title" required></div>
            <div class="form-group"><label>Policy Content</label><textarea id="policy-content" rows="6" required></textarea></div>
            <div class="form-group">
                <label>Status</label>
                <select id="policy-status"><option value="Published">Published</option><option value="Draft">Draft</option></select>
            </div>
            <div style="margin-top:20px; text-align:right;">
                <button class="outline-button" onclick="closePolicyModal()">Cancel</button>
                <button class="btn-primary" onclick="savePolicy()">Save Policy</button>
            </div>
        </div>
    </div>

    <script src="js/toast.js"></script>
  <script src="js/global-data.js?v=1780167290"></script>
    <script src="js/data-store.js?v=1780167290"></script>
    <script src="js/admin-auth.js?v=1780167290"></script>
    <script src="js/admin.js?v=1780167290"></script>
    <script src="js/admin-policies.js?v=1780167290"></script>
</body>
</html>
