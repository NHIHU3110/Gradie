<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradie Admin | Categories</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css?v=1780166734">
    <style>
        .modal { display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); }
        .modal-content { background:#fff; margin:50px auto; padding:20px; width:600px; border-radius:8px; max-height:80vh; overflow-y:auto; }
        .product-checkbox { display:flex; align-items:center; gap:10px; margin-bottom:10px; padding:10px; border:1px solid #eee; border-radius:4px; }
        .product-checkbox img { width:40px; height:40px; object-fit:cover; border-radius:4px; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <header class="topbar"></header>
            <div class="content-wrapper">
                <div class="dashboard-header" style="margin-bottom: 30px;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h2 style="margin:0; font-size: 2rem;">Category Manager</h2>
                            <p style="color: var(--admin-muted); margin-top: 5px;">Organize your products into collections.</p>
                        </div>
                        <button class="btn-primary" onclick="createNewCategory()">Add New Category</button>
                    </div>
                </div>
                
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>Category Name</th><th>Products Count</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="admin-category-list">
                            <!-- Auto generated -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for assigning products -->
    <div id="assignModal" class="modal">
        <div class="modal-content">
            <h3 id="modalCatName" style="margin-top:0;">Assign Products</h3>
            <p>Select products to include in this category:</p>
            <div id="modalProductList"></div>
            <div style="margin-top:20px; text-align:right;">
                <button class="outline-button" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="saveCategoryProducts()">Save Assignment</button>
            </div>
        </div>
    </div>

    <script src="../js/global-data.js?v=1780167290"></script>
    <script src="../js/data-store.js?v=1780167290"></script>
    <script src="../js/admin-auth.js?v=1780167290"></script>
    <script src="../js/admin.js?v=1780167290"></script>
    <script src="../js/admin-categories.js?v=1780167290"></script>
</body>
</html>
