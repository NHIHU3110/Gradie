<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradie Admin | Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css?v=1780166734">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <header class="topbar"></header>
            <div class="content-wrapper">
                <div class="dashboard-header" style="margin-bottom: 30px;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h2 style="margin:0; font-size: 2rem;">Product Manager</h2>
                            <p style="color: var(--admin-muted); margin-top: 5px;">Manage your inventory, prices, and product details.</p>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <a href="admin-product-form.html" class="btn-primary">Add Product</a>
                        </div>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-product-list">
                            <!-- Rendered via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/global-data.js?v=1780167290"></script>
    <script src="../js/data-store.js?v=1780167290"></script>
    <script src="../js/admin-auth.js?v=1780167290"></script>
    <script src="../js/admin.js?v=1780167290"></script>
    <script src="../js/admin-products.js"></script>
</body>
</html>
